<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Receipt - Brew Haven</title>

<link rel="stylesheet"
      href="style.css">
</head>

<body>

<section class="receipt-page">

    <div class="receipt-box">

        <h1>Brew Haven ☕</h1>

        <h2>Order Receipt</h2>

        <div id="receiptContent"></div>

        <button onclick="window.print()">
            Print Receipt
        </button>

        <br><br>

        <a href="index.html">
            <button>
                Return Home
            </button>
        </a>

    </div>

</section>

<script>

const order =
JSON.parse(
    localStorage.getItem(
        "brewHavenReceipt"
    )
);

let html = `

<p>
<strong>Order Number:</strong>
${order.orderNumber}
</p>

<p>
<strong>Date:</strong>
${order.date}
</p>

<p>
<strong>Customer:</strong>
${order.customerName}
</p>

<p>
<strong>Payment Method:</strong>
${order.paymentMethod}
</p>

<hr>

<h3>Items Ordered</h3>

`;

order.cart.forEach(item => {

    html += `
        <p>
            ${item.name}
            - ₱${item.price}
        </p>
    `;
});

html += `

<hr>

<p>
Subtotal:
₱${order.subtotal}
</p>

<p>
Delivery Fee:
₱${order.deliveryFee}
</p>

<h3>
Total:
₱${order.total}
</h3>

`;

document.getElementById(
    "receiptContent"
).innerHTML = html;

</script>

</body>
</html>

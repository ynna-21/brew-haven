<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Brew Haven</title>
    <link rel="icon" href="images/favicon.jpg?v=5">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Brew Haven ☕</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="products.html">Shop</a>
        <a href="contact.html">Contact</a>
        <a href="login.html" id="loginLink">Login</a>
        <a href="profile.html" id="profileLink">Profile</a>
        <a href="cart.html">
            Cart (<span id="cartCount">0</span>)
        </a>
    </nav>
</header>

<section class="profile-container">

    <div class="profile-card">

        <h1>👤 My Profile</h1>

        <div id="profileInfo"></div>

        <div class="profile-actions">

            <button onclick="logoutUser()">
                Logout
            </button>

        </div>

    </div>

</section>

<script>

const user =
JSON.parse(
    localStorage.getItem(
        "brewHavenUser"
    )
);

const receipt =
JSON.parse(
    localStorage.getItem(
        "brewHavenReceipt"
    )
);

let loyaltyPoints =
Number(
    localStorage.getItem(
        "brewHavenPoints"
    )
) || 0;

let html = "";

if(user){

    html += `

        <h2>${user.fullName}</h2>

        <p>
            📧 ${user.email}
        </p>

        <p>
            ☕ Brew Haven Member
        </p>

        <hr>

        <h3>⭐ Loyalty Rewards</h3>

        <p>
            Current Points:
            <strong>${loyaltyPoints}</strong>
        </p>

        <p>
            Earn 1 point for every ₱10 spent.
        </p>

        <p>
            Next Reward:
            FREE Latte at 200 Points
        </p>

        <progress
            value="${loyaltyPoints}"
            max="200">
        </progress>

    `;
}

if(receipt){

    html += `

        <hr>

        <h3>📦 Latest Order</h3>

        <p>
            Order #${receipt.orderNumber}
        </p>

        <p>
            Total:
            ₱${receipt.total}
        </p>

        <p>
            Payment Method:
            ${receipt.paymentMethod}
        </p>

    `;
}

<hr>

<h2>📊 Account Statistics</h2>

<p>Total Orders: <strong>12</strong></p>
<p>Total Spent: <strong>₱5,840</strong></p>
<p>Loyalty Points: <strong id="loyaltyPoints">68</strong></p>
<p>Rewards Redeemed: <strong>2</strong></p>

<hr>

<h2>🎁 Available Rewards</h2>

<div class="reward-grid">

    <div class="reward-card">
        <h3>☕ Free Espresso</h3>
        <p>100 Points</p>
    </div>

    <div class="reward-card">
        <h3>☕ Free Latte</h3>
        <p>200 Points</p>
    </div>

    <div class="reward-card">
        <h3>🥐 Free Pastry</h3>
        <p>300 Points</p>
    </div>

    <div class="reward-card">
        <h3>🥤 Brew Haven Tumbler</h3>
        <p>1000 Points</p>
    </div>

</div>

<hr>

<h2>🏆 Achievements</h2>

<div class="badge-grid">

    <div class="badge-card">
        ☕ First Order
    </div>

    <div class="badge-card">
        ⭐ Loyal Customer
    </div>

    <div class="badge-card">
        🥐 Pastry Lover
    </div>

    <div class="badge-card">
        🔥 10 Orders Completed
    </div>

</div>

<hr>

<h2>📦 Recent Orders</h2>

<div class="order-card">
    <p><strong>#BH1780712405096</strong></p>
    <p>₱360 • Delivered</p>
</div>

<div class="order-card">
    <p><strong>#BH1780711203045</strong></p>
    <p>₱420 • Delivered</p>
</div>

<div class="order-card">
    <p><strong>#BH1780709901988</strong></p>
    <p>₱250 • Delivered</p>
</div>

document.getElementById(
    "profileInfo"
).innerHTML = html;

function logoutUser(){

    localStorage.removeItem(
        "brewHavenUser"
    );

    alert(
        "You have been logged out."
    );

    window.location.href =
    "login.html";
}

</script>

<script>

const loginLink =
document.getElementById(
    "loginLink"
);

const profileLink =
document.getElementById(
    "profileLink"
);

if(user){

    if(loginLink){
        loginLink.style.display =
        "none";
    }

}else{

    if(profileLink){
        profileLink.style.display =
        "none";
    }

}

</script>

</body>
</html>
